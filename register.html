<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Photo/pgk.png" type="image/png">
    <title>Register - PK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 50px;
            position: relative;
        }

        .register-container {
            background: transparent;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 20px 40px;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            margin-bottom: 0;
        }

        #customSelect {
            background: transparent;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: normal;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }

        #languageDropdown {
            position: absolute;
            top: 35px;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            min-width: 150px;
            overflow: hidden;
        }

        #languageDropdown div {
            padding: 12px 20px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }

        #languageDropdown div:hover {
            background: #e3f2fd;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #333;
            font-size: 14px !important;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            background: #dedede;
            border-radius: 25px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            background: #e8f0f8;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background: #000;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: normal;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .register-btn:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 14px;
        }

        .login-link a {
            color: #ffa500;
            font-weight: normal;
            text-decoration: none;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 40px 30px;
            }

            .register-header h1 {
                font-size: 24px;
            }
        }

        /* Custom Alert */
        .custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
        }

        .custom-alert.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .custom-alert-content {
            background: #000;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .custom-alert-message {
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage()" style="display: none;">
                <option value="en">EN English</option>
                <option value="cn">CN China</option>
                <option value="th" selected>TH แบบไทย</option>
                <option value="vi">VI Ting Viet</option>
            </select>
            <div id="customSelect" onclick="toggleLanguageDropdown()">
                <span id="selectedLang">TH</span>
                <i class="fas fa-chevron-down" style="margin-left: 5px; font-size: 12px;"></i>
            </div>
            <div id="languageDropdown" style="display: none;">
                <div onclick="selectLanguage('en', 'EN')">EN English</div>
                <div onclick="selectLanguage('cn', 'CN')">CN China</div>
                <div onclick="selectLanguage('th', 'TH')">TH แบบไทย</div>
                <div onclick="selectLanguage('vi', 'VI')">VI Ting Viet</div>
            </div>
        </div>

        <div class="register-header">
            <h1 id="registerTitle">การลงทะเบียนผู้ใช้</h1>
        </div>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <input 
                    type="text" 
                    id="username" 
                    name="username"
                    placeholder="ชื่อผู้ใช้"
                    required
                >
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="กรุณากรอกรหัสผ่าน"
                        required
                    >
                    <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePasswordVisibility('password')"></i>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword"
                        placeholder="กรุณากรอกรหัสผ่านของคุณอีกครั้ง"
                        required
                    >
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword" onclick="togglePasswordVisibility('confirmPassword')"></i>
                </div>
            </div>

            <button type="submit" class="register-btn" id="registerBtn">ลงทะเบียน</button>
        </form>

        <div class="login-link">
            <span id="haveAccountText">มีบัญชี?</span>
            <a href="login.html" id="loginLinkText">สลับการเข้าสู่ระบบ</a>
        </div>
    </div>

    <!-- Custom Alert -->
    <div class="custom-alert" id="customAlert">
        <div class="custom-alert-content">
            <div class="custom-alert-message" id="alertMessage"></div>
        </div>
    </div>

    <script>
        // Custom Alert Function
        function showAlert(message) {
            const customAlert = document.getElementById('customAlert');
            const alertMessage = document.getElementById('alertMessage');
            
            alertMessage.textContent = message;
            customAlert.classList.add('show');
            
            setTimeout(() => {
                customAlert.classList.remove('show');
            }, 2000);
        }

        function toggleLanguageDropdown() {
            const dropdown = document.getElementById('languageDropdown');
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
        }

        function selectLanguage(value, shortCode) {
            document.getElementById('selectedLang').textContent = shortCode;
            document.getElementById('languageSelect').value = value;
            document.getElementById('languageDropdown').style.display = 'none';
            changeLanguage();
        }

        function changeLanguage() {
            const lang = document.getElementById('languageSelect').value;
            
            if (lang === 'en') {
                document.getElementById('registerTitle').textContent = 'User Registration';
                document.getElementById('username').placeholder = 'Username';
                document.getElementById('password').placeholder = 'Please enter password';
                document.getElementById('confirmPassword').placeholder = 'Please enter your password again';
                document.getElementById('registerBtn').textContent = 'Register';
                document.getElementById('haveAccountText').textContent = 'Have an account?';
                document.getElementById('loginLinkText').textContent = 'Switch to Login';
            } else if (lang === 'cn') {
                document.getElementById('registerTitle').textContent = '用户注册';
                document.getElementById('username').placeholder = '用户名';
                document.getElementById('password').placeholder = '请输入密码';
                document.getElementById('confirmPassword').placeholder = '请再次输入密码';
                document.getElementById('registerBtn').textContent = '注册';
                document.getElementById('haveAccountText').textContent = '有账户？';
                document.getElementById('loginLinkText').textContent = '切换到登录';
            } else if (lang === 'vi') {
                document.getElementById('registerTitle').textContent = 'Đăng ký người dùng';
                document.getElementById('username').placeholder = 'Tên người dùng';
                document.getElementById('password').placeholder = 'Vui lòng nhập mật khẩu';
                document.getElementById('confirmPassword').placeholder = 'Vui lòng nhập lại mật khẩu';
                document.getElementById('registerBtn').textContent = 'Đăng ký';
                document.getElementById('haveAccountText').textContent = 'Có tài khoản?';
                document.getElementById('loginLinkText').textContent = 'Chuyển sang đăng nhập';
            } else {
                document.getElementById('registerTitle').textContent = 'การลงทะเบียนผู้ใช้';
                document.getElementById('username').placeholder = 'ชื่อผู้ใช้';
                document.getElementById('password').placeholder = 'กรุณากรอกรหัสผ่าน';
                document.getElementById('confirmPassword').placeholder = 'กรุณากรอกรหัสผ่านของคุณอีกครั้ง';
                document.getElementById('registerBtn').textContent = 'ลงทะเบียน';
                document.getElementById('haveAccountText').textContent = 'มีบัญชี?';
                document.getElementById('loginLinkText').textContent = 'สลับการเข้าสู่ระบบ';
            }
        }
        function togglePasswordVisibility(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleIcon = fieldId === 'password' ? 
                document.getElementById('togglePassword') : 
                document.getElementById('toggleConfirmPassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate username
            if (username.length < 3) {
                showAlert('ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร');
                return;
            }
            
            // Validate password
            if (password.length < 6) {
                showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
                return;
            }
            
            // Check if passwords match
            if (password !== confirmPassword) {
                showAlert('รหัสผ่านไม่ตรงกัน กรุณาลองใหม่อีกครั้ง');
                return;
            }
            
            // Disable button to prevent double submission
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.textContent = 'กำลังลงทะเบียน...';
            
            // Send data to API
            fetch('api/register_user.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบ');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(data.message || 'เกิดข้อผิดพลาดในการลงทะเบียน');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'ลงทะเบียน';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์');
                registerBtn.disabled = false;
                registerBtn.textContent = 'ลงทะเบียน';
            });
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const selector = document.querySelector('.language-selector');
            if (selector && !selector.contains(event.target)) {
                document.getElementById('languageDropdown').style.display = 'none';
            }
        });
    </script>
</body>
</html>
