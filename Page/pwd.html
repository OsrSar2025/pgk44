<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Photo/pgk.png" type="image/png">
    <title>เปลี่ยนรหัสผ่านบัญชี - PK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            padding-bottom: 0;
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #333;
            cursor: pointer;
            margin-right: 15px;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .form-container {
            padding: 30px 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #333;
            background: white;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        .submit-section {
            padding: 20px;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            background: #000000;
            color: white;
            border: none;
            height: 45px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            background: #333333;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        .password-strength.weak {
            color: #ff4444;
        }

        .password-strength.medium {
            color: #ffaa00;
        }

        .password-strength.strong {
            color: #00aa00;
        }

        /* Custom Alert */
        .custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .custom-alert.show {
            opacity: 1;
            animation: fadeIn 0.3s ease;
        }
        .custom-alert-content {
            background: #222;
            padding: 18px 32px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .custom-alert-message {
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="goBack()">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="header-title">เปลี่ยนรหัสผ่านบัญชี</div>
    </div>

    <!-- Form Container -->
    <div class="form-container">
        <div class="input-group">
            <input type="password" id="oldPassword" class="input-field" placeholder="กรุณากรอกรหัสผ่านเดิม">
        </div>

        <div class="input-group">
            <input type="password" id="newPassword" class="input-field" placeholder="กรุณากรอกรหัสผ่านใหม่">
            <div id="passwordStrength" class="password-strength"></div>
        </div>

        <div class="input-group">
            <input type="password" id="confirmPassword" class="input-field" placeholder="กรุณายืนยันรหัสผ่านใหม่">
        </div>
    </div>

    <!-- Submit Section -->
    <div class="submit-section">
        <button class="submit-btn" onclick="submitPassword()">ส่ง</button>
    </div>

    <!-- Custom Alert -->
    <div class="custom-alert" id="customAlert">
        <div class="custom-alert-content">
            <div class="custom-alert-message" id="alertMessage"></div>
        </div>
    </div>

    <!-- Auto Update Service -->
    <script src="../api/auto_update_worker.js"></script>
    <script>
        // Auto Update Service Integration
        let autoUpdateInterval = null;
        
        function initializeAutoUpdate() {
            // เริ่มต้น auto-update service
            if (typeof autoUpdateWorker !== 'undefined') {
                console.log('Auto Update Service initialized in pwd.html');
                
                // อัปเดต stats ทุก 5 วินาที
                autoUpdateInterval = setInterval(() => {
                    const stats = autoUpdateWorker.getStats();
                    if (stats.isRunning) {
                        console.log(`Auto Update: ${stats.totalChecks} checks, ${stats.totalUpdated} updated, uptime: ${stats.uptime}`);
                    }
                }, 5000);
            }
        }
        
        function cleanupAutoUpdate() {
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
            }
        }
        
        // Translation System
        const translations = {
            th: {
                pageTitle: 'เปลี่ยนรหัสผ่านบัญชี',
                oldPassword: 'กรุณากรอกรหัสผ่านเดิม',
                newPassword: 'กรุณากรอกรหัสผ่านใหม่',
                confirmPassword: 'กรุณายืนยันรหัสผ่านใหม่',
                submit: 'ส่ง',
                weakPassword: 'รหัสผ่านอ่อน',
                mediumPassword: 'รหัสผ่านปานกลาง',
                strongPassword: 'รหัสผ่านแข็งแรง',
                passwordMismatch: 'รหัสผ่านไม่ตรงกัน',
                passwordMatch: 'รหัสผ่านตรงกัน',
                enterOldPassword: 'กรุณากรอกรหัสผ่านเดิม',
                enterNewPassword: 'กรุณากรอกรหัสผ่านใหม่',
                minPasswordLength: 'รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร',
                passwordsNotMatch: 'รหัสผ่านใหม่ไม่ตรงกัน',
                passwordMustDifferent: 'รหัสผ่านใหม่ต้องแตกต่างจากรหัสผ่านเดิม',
                pleaseLogin: 'กรุณาเข้าสู่ระบบใหม่',
                processingError: 'เกิดข้อผิดพลาดในการประมวลผล',
                changeSuccess: 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว',
                changeFailed: 'เปลี่ยนรหัสผ่านไม่สำเร็จ',
                connectionError: 'เกิดข้อผิดพลาดในการเชื่อมต่อ'
            },
            en: {
                pageTitle: 'Change Account Password',
                oldPassword: 'Please enter old password',
                newPassword: 'Please enter new password',
                confirmPassword: 'Please confirm new password',
                submit: 'Submit',
                weakPassword: 'Weak password',
                mediumPassword: 'Medium password',
                strongPassword: 'Strong password',
                passwordMismatch: 'Passwords do not match',
                passwordMatch: 'Passwords match',
                enterOldPassword: 'Please enter old password',
                enterNewPassword: 'Please enter new password',
                minPasswordLength: 'New password must be at least 6 characters',
                passwordsNotMatch: 'New passwords do not match',
                passwordMustDifferent: 'New password must be different from old password',
                pleaseLogin: 'Please login again',
                processingError: 'Processing error',
                changeSuccess: 'Password changed successfully',
                changeFailed: 'Password change failed',
                connectionError: 'Connection error'
            },
            cn: {
                pageTitle: '更改账户密码',
                oldPassword: '请输入旧密码',
                newPassword: '请输入新密码',
                confirmPassword: '请确认新密码',
                submit: '提交',
                weakPassword: '密码弱',
                mediumPassword: '密码中等',
                strongPassword: '密码强',
                passwordMismatch: '密码不匹配',
                passwordMatch: '密码匹配',
                enterOldPassword: '请输入旧密码',
                enterNewPassword: '请输入新密码',
                minPasswordLength: '新密码必须至少6个字符',
                passwordsNotMatch: '新密码不匹配',
                passwordMustDifferent: '新密码必须与旧密码不同',
                pleaseLogin: '请重新登录',
                processingError: '处理错误',
                changeSuccess: '密码更改成功',
                changeFailed: '密码更改失败',
                connectionError: '连接错误'
            },
            vi: {
                pageTitle: 'Thay đổi mật khẩu tài khoản',
                oldPassword: 'Vui lòng nhập mật khẩu cũ',
                newPassword: 'Vui lòng nhập mật khẩu mới',
                confirmPassword: 'Vui lòng xác nhận mật khẩu mới',
                submit: 'Gửi',
                weakPassword: 'Mật khẩu yếu',
                mediumPassword: 'Mật khẩu trung bình',
                strongPassword: 'Mật khẩu mạnh',
                passwordMismatch: 'Mật khẩu không khớp',
                passwordMatch: 'Mật khẩu khớp',
                enterOldPassword: 'Vui lòng nhập mật khẩu cũ',
                enterNewPassword: 'Vui lòng nhập mật khẩu mới',
                minPasswordLength: 'Mật khẩu mới phải có ít nhất 6 ký tự',
                passwordsNotMatch: 'Mật khẩu mới không khớp',
                passwordMustDifferent: 'Mật khẩu mới phải khác mật khẩu cũ',
                pleaseLogin: 'Vui lòng đăng nhập lại',
                processingError: 'Lỗi xử lý',
                changeSuccess: 'Đổi mật khẩu thành công',
                changeFailed: 'Đổi mật khẩu thất bại',
                connectionError: 'Lỗi kết nối'
            }
        };

        // Translation helper function
        function t(key) {
            const currentLang = localStorage.getItem('preferredLang') || 'th';
            return translations[currentLang][key] || translations.th[key] || key;
        }

        // Update page language
        function updatePageLanguage() {
            // Update header title
            document.querySelector('.header-title').textContent = t('pageTitle');
            
            // Update input placeholders
            document.getElementById('oldPassword').placeholder = t('oldPassword');
            document.getElementById('newPassword').placeholder = t('newPassword');
            document.getElementById('confirmPassword').placeholder = t('confirmPassword');
            
            // Update submit button
            document.querySelector('.submit-btn').textContent = t('submit');
        }

        // Back button functionality
        function goBack() {
            window.history.back();
        }

        // Password strength checker
        function checkPasswordStrength(password) {
            const strengthDiv = document.getElementById('passwordStrength');
            if (!password) {
                strengthDiv.textContent = '';
                return;
            }

            let strength = 0;
            let message = '';

            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength < 3) {
                message = t('weakPassword');
                strengthDiv.className = 'password-strength weak';
            } else if (strength < 4) {
                message = t('mediumPassword');
                strengthDiv.className = 'password-strength medium';
            } else {
                message = t('strongPassword');
                strengthDiv.className = 'password-strength strong';
            }

            strengthDiv.textContent = message;
        }

        // Password confirmation checker
        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (confirmPassword && newPassword !== confirmPassword) {
                strengthDiv.textContent = t('passwordMismatch');
                strengthDiv.className = 'password-strength weak';
            } else if (confirmPassword && newPassword === confirmPassword && newPassword.length >= 6) {
                strengthDiv.textContent = t('passwordMatch');
                strengthDiv.className = 'password-strength strong';
            } else if (newPassword) {
                checkPasswordStrength(newPassword);
            }
        }

        // Show custom alert
        function showAlert(message) {
            const customAlert = document.getElementById('customAlert');
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.textContent = message;
            customAlert.classList.add('show');
            setTimeout(() => {
                customAlert.classList.remove('show');
            }, 2000);
        }

        // Event listeners
        document.getElementById('newPassword').addEventListener('input', function() {
            checkPasswordStrength(this.value);
            if (document.getElementById('confirmPassword').value) {
                checkPasswordMatch();
            }
        });

        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        // Submit function
        async function submitPassword() {
            const oldPassword = document.getElementById('oldPassword').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const userId = localStorage.getItem('userId');

            console.log('=== DEBUG INFO ===');
            console.log('userId:', userId);
            console.log('oldPassword length:', oldPassword.length);
            console.log('newPassword length:', newPassword.length);

            if (!oldPassword) {
                showAlert(t('enterOldPassword'));
                return;
            }
            if (!newPassword) {
                showAlert(t('enterNewPassword'));
                return;
            }
            if (newPassword.length < 6) {
                showAlert(t('minPasswordLength'));
                return;
            }
            if (newPassword !== confirmPassword) {
                showAlert(t('passwordsNotMatch'));
                return;
            }
            if (oldPassword === newPassword) {
                showAlert(t('passwordMustDifferent'));
                return;
            }
            if (!userId) {
                showAlert(t('pleaseLogin'));
                setTimeout(() => window.location.href = '../login.html', 1500);
                return;
            }
            
            try {
                // เรียก API เปลี่ยนรหัสผ่าน
                console.log('Sending request to API...');
                const requestBody = {
                    user_id: userId,
                    old_password: oldPassword,
                    new_password: newPassword
                };
                console.log('Request body:', requestBody);
                
                const res = await fetch('../api/update_user_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const responseText = await res.text();
                console.log('API Raw Response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error('JSON Parse Error:', e);
                    showAlert(t('processingError'));
                    return;
                }
                
                console.log('API Parsed Response:', data);
                
                if (data.success) {
                    showAlert(t('changeSuccess'));
                    setTimeout(goBack, 1500);
                } else {
                    showAlert(data.message || t('changeFailed'));
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(t('connectionError'));
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Update page language
            updatePageLanguage();
            
            // Initialize auto-update service
            initializeAutoUpdate();
        });

        // Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitPassword();
            }
        });
    </script>

    <!-- Auto Logout System -->
    <script src="../api/auto_logout.js"></script>
</body>
</html>
