<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Photo/pgk.png" type="image/png">
    <title>Test Modal - ทดสอบปุ่มเปลี่ยนสี</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background: white;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
        }
        
        .team-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        
        .team-btn {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #eee !important;
            color: #666 !important;
            font-size: 16px;
            cursor: pointer;
        }
        
        .team-btn.red.active {
            background: #e74c3c !important;
            color: white !important;
        }
        
        .team-btn.blue.active {
            background: #4a90e2 !important;
            color: white !important;
        }
        
        .open-btn {
            padding: 15px 30px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>ทดสอบปุ่มเปลี่ยนสี</h1>
    <button class="open-btn" onclick="openModal()">เปิด Modal</button>
    
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>เลือกทีม</h2>
            
            <div class="team-buttons">
                <button class="team-btn red" id="redBtn" onclick="selectTeam('red')">ทีมสีแดง</button>
                <button class="team-btn blue" id="blueBtn" onclick="selectTeam('blue')">ทีมสีน้ำเงิน</button>
            </div>
            
            <div class="result" id="result">กรุณาเลือกทีม</div>
        </div>
    </div>

    <script>
        var selectedTeam = '';
        
        function openModal() {
            document.getElementById('myModal').style.display = 'block';
            
            // Reset
            var redBtn = document.getElementById('redBtn');
            var blueBtn = document.getElementById('blueBtn');
            redBtn.className = 'team-btn red';
            blueBtn.className = 'team-btn blue';
            selectedTeam = '';
            document.getElementById('result').textContent = 'กรุณาเลือกทีม';
        }
        
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }
        
        function selectTeam(team) {
            var redBtn = document.getElementById('redBtn');
            var blueBtn = document.getElementById('blueBtn');
            var result = document.getElementById('result');
            
            // Reset both buttons
            redBtn.className = 'team-btn red';
            blueBtn.className = 'team-btn blue';
            
            // Set active
            if (team === 'red') {
                redBtn.className = 'team-btn red active';
                selectedTeam = 'red';
                result.textContent = '✅ เลือกทีมสีแดง - ปุ่มควรเป็นสีแดง!';
            } else if (team === 'blue') {
                blueBtn.className = 'team-btn blue active';
                selectedTeam = 'blue';
                result.textContent = '✅ เลือกทีมสีน้ำเงิน - ปุ่มควรเป็นสีน้ำเงิน!';
            }
        }
        
        window.onclick = function(event) {
            var modal = document.getElementById('myModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
