<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Photo/pgk.png" type="image/png">
    <title>ฝ่ายบริการออนไลน์ - PK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        .header {
            background: rgb(0, 122, 255);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #000;
        }

        .header-content {
            flex: 1;
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .header-subtitle {
            font-size: 11px;
            opacity: 0.95;
            line-height: 1.3;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .close-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .speaker-icon {
            font-size: 12px;
            cursor: pointer;
            align-self: flex-start;
            padding-top: 2px;
        }

        .toggle-section {
            background: white;
            padding: 12px 20px;
            text-align: center;
            color: #999;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            padding-top: 120px;
            padding-bottom: 140px;
            overflow-y: auto;
            background: #f5f5f5;
            margin: 0;
            height: calc(100vh - 260px);
            min-height: 400px;
        }
        
        /* Custom scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: #007bff;
            border-radius: 4px;
        }
        
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #0056b3;
        }

        .chat-message {
            margin-bottom: 15px;
        }

        .message-time {
            color: #999;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .message-bubble {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            width: auto;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.3;
            white-space: normal;
            word-wrap: break-word;
            margin: 2px 0;
        }

        .info-section {
            background: white;
            padding: 12px 20px;
            border-top: 1px solid #eee;
        }

        .info-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .info-list {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            list-style: none;
        }

        .info-list li {
            padding: 3px 0;
        }

        .input-section {
            background: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #eee;
            justify-content: space-between;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .icon-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 14px;
            color: #999;
            cursor: pointer;
            padding: 5px;
            font-weight: 300;
        }
        
        .icon-btn i {
            font-weight: 300;
        }

        .message-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 8px;
            background: transparent;
        }

        .message-input::placeholder {
            color: #999;
        }

        .send-btn {
            background: rgb(0, 122, 255);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: normal;
        }

        .input-label {
            background: white;
            padding: 10px 15px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            position: fixed;
            bottom: 55px;
            left: 0;
            right: 0;
            z-index: 1000;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .input-label .message-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 8px 12px;
            background: white;
            border-radius: 4px;
        }

        .send-btn:active {
            background: rgb(0, 100, 220);
        }

        /* Emoji Picker Styles */
        .emoji-picker {
            display: none;
            position: fixed;
            bottom: auto;
            top: auto;
            left: 0;
            right: 0;
            width: 100%;
            background: white;
            border-radius: 0;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
        }

        .emoji-picker.show {
            display: block;
        }

        .emoji-header {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
        }

        .emoji-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 8px 10px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .emoji-tab {
            font-size: 20px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .emoji-tab.active {
            background: #e8f4ff;
        }

        .emoji-tab:hover {
            background: #f0f0f0;
        }

        .emoji-category {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        .emoji-close {
            background: none;
            border: none;
            font-size: 20px;
            color: #999;
            cursor: pointer;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            padding: 10px;
        }

        .emoji-item {
            font-size: 24px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .emoji-item:hover {
            background: #f0f0f0;
        }

        /* Fullscreen modal styles */
        .fullscreen-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow: auto;
        }

        .fullscreen-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-content {
            position: relative;
            max-width: 95%;
            max-height: 95%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-content img,
        .fullscreen-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .fullscreen-close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10001;
        }

        .fullscreen-close:hover {
            color: #ccc;
        }

        .fullscreen-caption {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
        }

        /* Make images and videos clickable */
        .message-bubble img,
        .message-bubble video {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .message-bubble img:hover,
        .message-bubble video:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- Header -->

        <div class="header-logo">
            <i class="fas fa-headset"></i>
        </div>
        <div class="header-content">

    </div>

            <div class="emoji-tab" data-category="symbols">🔣</div>

    <!-- Input Section -->

    <input type="file" id="videoInput" accept="video/*" style="display: none;">

    <!-- Fullscreen Modal -->
    <div id="fullscreenModal" class="fullscreen-modal">
        <span class="fullscreen-close" onclick="closeFullscreen()">&times;</span>
        <div class="fullscreen-content">
            <img id="fullscreenImage" style="display: none;">
            <video id="fullscreenVideo" controls style="display: none;"></video>
        </div>
        <div class="fullscreen-caption" id="fullscreenCaption"></div>

                // อัปเดต stats ทุก 5 วินาที

                    const stats = autoUpdateWorker.getStats();
                    if (stats.isRunning) {
                        console.log(`Auto Update: ${stats.totalChecks} checks, ${stats.totalUpdated} updated, uptime: ${stats.uptime}`);
                    }
                }, 5000);

                uploadImageError: 'ไม่สามารถอัปโหลดรูปภาพได้: ',

            },

                workingHoursFallback: 'Chào mừng đến với dịch vụ hỗ trợ 11.00-22.30 Vui lòng liên hệ bộ phận hỗ trợ...',

                uploadVideoErrorGeneral: 'Lỗi xảy ra khi tải lên video',

        };

        // Current language (read from main page)
        let currentLang = localStorage.getItem('preferredLang') || 'th';

        // Get translation
        function t(key) {
            const keys = key.split('.');
            let value = translations[currentLang];
            for (const k of keys) {
                value = value[k];
            }
            return value || key;
        }

        // Update page language (read from localStorage, no language switching)
        function updatePageLanguage() {
            // Read language from localStorage (set by main page)
            currentLang = localStorage.getItem('preferredLang') || 'th';
            
            const trans = translations[currentLang];
            
            // Update page title
            document.getElementById('pageTitle').textContent = trans.pageTitle;
            
            // Update welcome message
            document.getElementById('welcomeTime').textContent = trans.welcomeTime;
            document.getElementById('welcomeMessage').textContent = trans.welcomeMessage.trim();
            
            // Update input placeholder
            document.getElementById('topMessageInput').placeholder = trans.messagePlaceholder;
            
            // Update button text
            document.getElementById('sendButton').textContent = trans.sendButton;
        }

        // Send message functionality
        const messageInput = document.getElementById('topMessageInput');
        const sendBtn = document.querySelector('.send-btn');
        const chatContainer = document.querySelector('.chat-container');
        
        // Get user info from localStorage
        let userId = localStorage.getItem('userId');
        let userName = localStorage.getItem('userName') || localStorage.getItem('username') || '';
        
        // If not logged in, generate or retrieve a Guest ID
        if (!userId) {
            userId = localStorage.getItem('guestId');
            if (!userId) {
                userId = 'GUEST_' + Date.now();
                localStorage.setItem('guestId', userId);
            }
            userName = 'ลูกค้านิรนาม';
        }
        
        // Auto refresh variables
        let messageRefreshInterval;
        let lastMessageCount = 0;
        
        // Load user name if not available
        loadUserName();
        
        // Load working hours from database
        loadWorkingHours();
        
        // Load previous messages on page load
        loadPreviousMessages();
        
        // Start auto refresh
        startMessageRefresh();
        
        // Fullscreen modal functions
        function openFullscreen(src, type, caption = '') {
            const modal = document.getElementById('fullscreenModal');
            const image = document.getElementById('fullscreenImage');
            const video = document.getElementById('fullscreenVideo');
            const captionElement = document.getElementById('fullscreenCaption');
            
            // Hide both elements first
            image.style.display = 'none';
            video.style.display = 'none';
            
            if (type === 'image') {
                image.src = src;
                image.style.display = 'block';
                video.pause(); // Pause any playing video
            } else if (type === 'video') {
                video.src = src;
                video.style.display = 'block';
            }
            
            captionElement.textContent = caption;
            modal.classList.add('show');
            
            // Prevent body scroll when modal is open
            document.body.style.overflow = 'hidden';
        }
        
        function closeFullscreen() {
            const modal = document.getElementById('fullscreenModal');
            const image = document.getElementById('fullscreenImage');
            const video = document.getElementById('fullscreenVideo');
            
            modal.classList.remove('show');
            
            // Pause video and reset
            video.pause();
            video.currentTime = 0;
            
            // Reset src to stop loading
            image.src = '';
            video.src = '';
            
            // Restore body scroll
            document.body.style.overflow = 'auto';
        }
        
        // Close modal when clicking outside content
        document.getElementById('fullscreenModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFullscreen();
            }
        });
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeFullscreen();
            }
        });
        
        // Function to go back to profile page
        function goToProfile() {
            window.location.href = 'profile.html';
        }

        // Function to load user name from localStorage
        function loadUserName() {
            if (userId && !userId.startsWith('GUEST_')) {
                // Try to get from various localStorage keys
                let actualUserName = localStorage.getItem('userName') ||
                                   localStorage.getItem('name') ||
                                   localStorage.getItem('username') ||
                                   localStorage.getItem('fullName') ||
                                   localStorage.getItem('displayName');
                
                // If still no name, use User + ID
                if (!actualUserName || actualUserName === 'ผู้ใช้') {
                    actualUserName = 'User' + userId;
                }
                
                console.log('Loaded user name:', actualUserName);
                
                // Update localStorage with the correct name
                localStorage.setItem('userName', actualUserName);
                // Update the global userName variable
                userName = actualUserName;
            } else if (userId && userId.startsWith('GUEST_')) {
                userName = 'ลูกค้านิรนาม';

                    filteredMessages.sort((a, b) => {

        // Build stable media URLs for localhost and production domains
        function buildMediaUrl(filePath) {
            if (!filePath) return '';

            // Already absolute URL
            if (/^https?:\/\//i.test(filePath)) {
                return filePath;
            }

            // Normalize "../image/..." and "/image/..." to "image/..."
            const normalizedPath = filePath
                .replace(/^(\.\.\/)+/, '')
                .replace(/^\.\//, '')
                .replace(/^\/+/, '');

            // Current app often runs in "/<project>/Page/support.html"
            // so keep the project prefix to avoid broken URLs on real domains.
            const pathname = window.location.pathname;
            const pageIndex = pathname.indexOf('/Page/');
            const projectPrefix = pageIndex > 0 ? pathname.substring(0, pageIndex) : '';

            return `${window.location.origin}${projectPrefix}/${normalizedPath}`;
        }

                        loadPreviousMessages();

        // Function to add message to chat
        function addMessageToChat(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            
            // Parse timestamp and display in Thailand local time
            let time;
            if (message.created_at) {
                // Database stores in format: 'YYYY-MM-DD HH:MM:SS'
                // Parse it as local time (Thailand time)
                const parts = message.created_at.split(/[- :]/);
                time = new Date(
                    parseInt(parts[0]),      // year
                    parseInt(parts[1]) - 1,  // month (0-indexed)
                    parseInt(parts[2]),      // day
                    parseInt(parts[3]),      // hour
                    parseInt(parts[4]),      // minute
                    parseInt(parts[5]) || 0  // second
                );
            } else {
                time = new Date();
            }
            
            const timeString = time.getHours().toString().padStart(2, '0') + ':' + 
                             time.getMinutes().toString().padStart(2, '0');
            
            // Determine if message is from admin or user
            const isAdmin = message.user_name === 'Admin' && message.user_id === userId;
            const isUser = message.user_id === userId && message.user_name !== 'Admin';
            
            let messageContent = '';
            let bubbleStyle = '';
            let timeLabel = '';
            let textAlign = '';
            
            if (isAdmin) {
                // Admin message - left side
                textAlign = 'left';
                timeLabel = `${t('pageTitle')} ${timeString}`;
                bubbleStyle = 'background: white; color: #333;';
            } else if (isUser) {
                // User message - right side
                textAlign = 'right';
                timeLabel = `คุณ ${timeString}`;
                bubbleStyle = 'background: #1e90ff; color: white;';
            }
            
            if (message.message_text) {
                const formattedText = message.message_text.replace(/\n/g, '<br>');
                messageContent = `<div class="message-bubble" style="${bubbleStyle}">${formattedText}</div>`;
            } else if (message.emoji) {
                messageContent = `<div class="message-bubble" style="${bubbleStyle}; font-size: 24px;">${message.emoji}</div>`;
            } else if (message.image_path) {
                const imageUrl = buildMediaUrl(message.image_path);
                messageContent = `<div class="message-bubble" style="background: white; padding: 5px;"><img src="${imageUrl}" style="max-width: 200px; max-height: 200px; border-radius: 8px;" onclick="openFullscreen('${imageUrl}', 'image', 'รูปภาพ')"></div>`;
            } else if (message.video_path) {
                const videoUrl = buildMediaUrl(message.video_path);
                messageContent = `<div class="message-bubble" style="background: white; padding: 5px;"><video src="${videoUrl}" controls style="max-width: 200px; max-height: 200px; border-radius: 8px;" onclick="openFullscreen('${videoUrl}', 'video', 'วิดีโอ')"></video></div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-time" style="text-align: ${textAlign};">${timeLabel}</div>
                <div style="text-align: ${textAlign};">
                    ${messageContent}
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
        }

            saveMessageWithUserName(messageText, emoji, imagePath, videoPath, imageSize, videoSize, mimeType, finalUserName);

        });

        imageInput.addEventListener('change', function(e) {
            // Check if user is logged in or is a guest
            if (!userId) {
                userId = localStorage.getItem('guestId') || 'GUEST_' + Date.now();
                localStorage.setItem('guestId', userId);
                userName = 'ลูกค้านิรนาม';
            }
            
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                // Upload file to server
                const formData = new FormData();
                formData.append('file', file);
                formData.append('file_type', 'image');
                
                fetch('../api/upload_file.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const imageUrl = buildMediaUrl(data.file_path);
                        // Save message with image to database
                        saveMessageToDatabase('', '', data.file_path, '', data.file_size, 0, data.mime_type);
                        
                        const now = new Date();
                        const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                                         now.getMinutes().toString().padStart(2, '0');
                        
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'chat-message';
                        messageDiv.innerHTML = `
                            <div class="message-time" style="text-align: right;">คุณ ${timeString}</div>
                            <div style="text-align: right;">
                                <div class="message-bubble" style="background: white; padding: 5px;">
                                    <img src="${imageUrl}" style="max-width: 200px; max-height: 200px; border-radius: 8px;" onclick="openFullscreen('${imageUrl}', 'image', 'รูปภาพ')">
                                </div>
                            </div>
                        `;
                        
                        chatContainer.appendChild(messageDiv);
                        
                        // Update message count
                        lastMessageCount++;
                        
                        scrollToBottom();
                        
                        // Additional scroll after DOM update
                        setTimeout(() => {
                            scrollToBottom();
                        }, 100);
                        
                        console.log('Image uploaded successfully:', data.file_path);
                    } else {
                        console.error('Failed to upload image:', data.message);
                        alert(t('uploadImageError') + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error uploading image:', error);
                    alert(t('uploadImageErrorGeneral'));
                });
            }
            imageInput.value = '';
        });

        // Video upload functionality
        videoBtn.addEventListener('click', function() {
            videoInput.click();
        });

        videoInput.addEventListener('change', function(e) {
            // Check if user is logged in or is a guest
            if (!userId) {
                userId = localStorage.getItem('guestId') || 'GUEST_' + Date.now();
                localStorage.setItem('guestId', userId);
                userName = 'ลูกค้านิรนาม';
            }
            
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
                // Upload file to server
                const formData = new FormData();
                formData.append('file', file);
                formData.append('file_type', 'video');
                
                fetch('../api/upload_file.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const videoUrl = buildMediaUrl(data.file_path);
                        // Save message with video to database
                        saveMessageToDatabase('', '', '', data.file_path, 0, data.file_size, data.mime_type);
                        
                        const now = new Date();
                        const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                                         now.getMinutes().toString().padStart(2, '0');
                        
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'chat-message';
                        messageDiv.innerHTML = `
                            <div class="message-time" style="text-align: right;">คุณ ${timeString}</div>
                            <div style="text-align: right;">
                                <div class="message-bubble" style="background: white; padding: 5px;">
                                    <video src="${videoUrl}" controls style="max-width: 200px; max-height: 200px; border-radius: 8px;" onclick="openFullscreen('${videoUrl}', 'video', 'วิดีโอ')"></video>
                                </div>
                            </div>
                        `;
                        
                        chatContainer.appendChild(messageDiv);
                        
                        // Update message count
                        lastMessageCount++;
                        
                        scrollToBottom();
                        
                        // Additional scroll after DOM update
                        setTimeout(() => {
                            scrollToBottom();
                        }, 100);
                        
                        console.log('Video uploaded successfully:', data.file_path);
                    } else {
                        console.error('Failed to upload video:', data.message);
                        alert(t('uploadVideoError') + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error uploading video:', error);
                    alert(t('uploadVideoErrorGeneral'));
                });
            }
            videoInput.value = '';
        });

        // Auto-logout functionality (10 minutes inactivity)
        let inactivityTimer;
        const LOGOUT_TIME = 10 * 60 * 1000;
        
        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                localStorage.clear();
                window.location.href = '../login.html';
            }, LOGOUT_TIME);
        }
        
        function trackUserActivity() {
            resetInactivityTimer();
        }

        // Start auto-logout on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Load language from main page on page load
            updatePageLanguage();
            
            resetInactivityTimer();
            
            document.addEventListener('mousemove', trackUserActivity);
            document.addEventListener('keypress', trackUserActivity);
            document.addEventListener('keydown', trackUserActivity);
            document.addEventListener('click', trackUserActivity);
            document.addEventListener('scroll', trackUserActivity);
            document.addEventListener('touchstart', trackUserActivity);
            document.addEventListener('touchmove', trackUserActivity);
            
            // Initialize auto-update service
            initializeAutoUpdate();
        });
    </script>

    <!-- Auto Logout System -->
    <script src="../api/auto_logout.js"></script>
</body>
</html>
