<!-- Footer CSS -->
<style>
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #f8f9fa;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0;
    z-index: 1000;
    border-top: 1px solid #ccc;
    height: 50px;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #666;
    transition: all 0.3s ease;
    padding: 2px 8px;
    border-radius: 8px;
    min-width: 60px;
    flex: 1;
}

.nav-item:hover {
    color: #333;
}

.nav-item.active {
    color: #e74c3c;
}

.nav-icon {
    font-size: 18px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
}

.nav-label {
    font-size: 12px;
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    font-weight: 500;
}
</style>

<!-- Footer JavaScript -->
<script>
(function() {
    // Footer translations
    const footerTranslations = {
        en: { 
            home: 'Home', 
            welfare: 'Public Welfare List', 
            chart: 'Anti-Fraud', 
            profile: 'My Profile' 
        },
        cn: { 
            home: '首页', 
            welfare: '公共福利列表', 
            chart: '反欺诈', 
            profile: '我的' 
        },
        th: { 
            home: 'หน้าแรก', 
            welfare: 'รายการสวัสดิการสาธารณะ', 
            chart: 'ต่อต้านการฉ้อโกง', 
            profile: 'ของฉัน' 
        },
        vi: { 
            home: 'Trang chủ', 
            welfare: 'Danh sách phúc lợi công cộng', 
            chart: 'Chống gian lận', 
            profile: 'Của tôi' 
        }
    };

    function updateFooterLanguage() {
        // Get language from localStorage (set by index.html or pkg44.html)
        const currentLang = localStorage.getItem('preferredLang') || 'th';
        
        // Update all footer labels
        const footerLabels = document.querySelectorAll('.bottom-nav .nav-label[data-lang-key]');
        footerLabels.forEach(function(label) {
            const key = label.getAttribute('data-lang-key');
            const keys = key.split('.');
            if (keys.length === 2 && keys[0] === 'footer') {
                const translation = footerTranslations[currentLang];
                if (translation && translation[keys[1]]) {
                    label.textContent = translation[keys[1]];
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        // Add click handlers for navigation
        const bottomNavItems = document.querySelectorAll('.bottom-nav .nav-item');
        
        bottomNavItems.forEach(item => {
            item.addEventListener('click', function(e) {
                // Remove active class from all items
                bottomNavItems.forEach(i => i.classList.remove('active'));
                
                // Add active class to clicked item
                this.classList.add('active');
            });
        });

        // Update footer language immediately
        updateFooterLanguage();
    });

    // Also update when DOM is ready (backup)
    if (document.readyState !== 'loading') {
        setTimeout(updateFooterLanguage, 100);
    }
})();
</script>
