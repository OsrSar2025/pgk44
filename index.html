        // สร้าง URL รูปให้ใช้ได้ทั้ง localhost และ domain (ลด 404)
        function getImageUrl(path) {
            if (!path || typeof path !== 'string') return '';
            if (path.startsWith('http://') || path.startsWith('https://')) return path;
            var p = window.location.pathname;
            var base = p.indexOf('/Page/') >= 0 ? p.substring(0, p.indexOf('/Page/') + 1) : (p === '/' || p === '' ? '/' : (p.endsWith('/') ? p : (p.lastIndexOf('/') === 0 ? p + '/' : p.substring(0, p.lastIndexOf('/') + 1))));
            var rel = path.startsWith('/') ? path.substring(1) : path;
            return window.location.origin + base + rel;
        }

                localStorage.clear(); // ล้างข้อมูลทั้งหมด
                window.location.href = 'login.html'; // ไปหน้า login

        }

                            footerLabels.forEach(label => {
                                const key = label.getAttribute('data-lang-key');
                                const keys = key.split('.');
                                if (keys.length === 2 && keys[0] === 'footer') {
                                    label.textContent = trans.footer[keys[1]];
                                }
                            });
                        }, 100);
                    })
                    .catch(error => {
                        console.error('Error loading footer:', error);
                    });
            }

            // Load initial notification (not affected by language)
            if (!isLoadingNotification && !window.notificationLoaded) {
                window.notificationLoaded = true;
                loadNotificationMessage();
            }
            
            // Load initial data only once (prevent multiple calls)
            if (!isLoadingWelfare && !window.welfareLoaded) {
                window.welfareLoaded = true;
                loadWelfareData();
            }
        });

        // Copy invite link function
        function copyInviteLink() {
            const inviteLinkInput = document.getElementById('inviteLink');
            inviteLinkInput.select();
            inviteLinkInput.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                document.execCommand('copy');
                alert(t('copySuccess'));
            } catch (err) {
                console.error('Failed to copy: ', err);
                alert(t('copyFailed'));
            }
        }
    </script>

    <!-- Auto Logout System -->
    <script src="api/auto_logout.js"></script>
</body>
