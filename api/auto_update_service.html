<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Photo/pgk.png" type="image/png">
    <title>Auto Update Service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
        }
        .success {
            background: rgba(40, 167, 69, 0.8);
            border: 2px solid #28a745;
        }
        .error {
            background: rgba(220, 53, 69, 0.8);
            border: 2px solid #dc3545;
        }
        .info {
            background: rgba(23, 162, 184, 0.8);
            border: 2px solid #17a2b8;
        }
        .warning {
            background: rgba(255, 193, 7, 0.8);
            border: 2px solid #ffc107;
            color: #000;
        }
        .log {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 0.9em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        .auto-refresh {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="auto-refresh" id="autoRefreshStatus">
        🔄 Auto-Refresh: OFF
    </div>

    <div class="container">
        <h1>🚀 Auto Update Service</h1>
        
        <div id="status" class="status info">
            Ready to start auto-update system
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalChecks">0</div>
                <div class="stat-label">Total Checks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalUpdated">0</div>
                <div class="stat-label">Bets Updated</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastUpdate">--:--</div>
                <div class="stat-label">Last Update</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uptime">00:00</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="startService()" id="startBtn">▶️ Start Service</button>
            <button onclick="stopService()" id="stopBtn" disabled>⏹️ Stop Service</button>
            <button onclick="testUpdate()" id="testBtn">🧪 Test Update</button>
            <button onclick="clearLog()" id="clearBtn">🗑️ Clear Log</button>
        </div>
        
        <div id="log" class="log">
            Auto Update Service loaded...
            Click "Start Service" to begin auto-updating pending bets every 30 seconds.
        </div>
    </div>

    <script>
        let serviceInterval = null;
        let startTime = null;
        let totalChecks = 0;
        let totalUpdated = 0;
        
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleString('th-TH');
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
        
        function updateStats() {
            document.getElementById('totalChecks').textContent = totalChecks;
            document.getElementById('totalUpdated').textContent = totalUpdated;
            
            if (startTime) {
                const uptime = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(uptime / 60);
                const seconds = uptime % 60;
                document.getElementById('uptime').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        function startService() {
            if (serviceInterval) {
                log('⚠️ Service is already running');
                return;
            }
            
            log('🚀 Starting Auto Update Service...');
            updateStatus('Service is running...', 'success');
            
            startTime = Date.now();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('autoRefreshStatus').textContent = '🔄 Auto-Refresh: ON';
            
            // เรียกใช้ทันทีครั้งแรก
            runUpdate();
            
            // ตั้ง interval ทุก 30 วินาที
            serviceInterval = setInterval(runUpdate, 30000);
            
            // อัปเดต stats ทุกวินาที
            setInterval(updateStats, 1000);
        }
        
        function stopService() {
            if (serviceInterval) {
                clearInterval(serviceInterval);
                serviceInterval = null;
                log('⏹️ Service stopped');
                updateStatus('Service stopped', 'info');
                
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('autoRefreshStatus').textContent = '🔄 Auto-Refresh: OFF';
            } else {
                log('⚠️ No service running');
            }
        }
        
        async function runUpdate() {
            totalChecks++;
            log(`🔄 Running update check #${totalChecks}...`);
            
            try {
                const response = await fetch('auto_update_pending_bets.php');
                const data = await response.json();
                
                if (data.success) {
                    if (data.updated_count > 0) {
                        totalUpdated += data.updated_count;
                        log(`✅ Updated ${data.updated_count} bets: ${JSON.stringify(data.results)}`);
                        updateStatus(`Updated ${data.updated_count} bets`, 'success');
                        
                        // อัปเดต last update time
                        const now = new Date();
                        document.getElementById('lastUpdate').textContent = 
                            now.toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'});
                    } else {
                        log(`ℹ️ No expired bets found (${data.expired_bets_found} pending bets checked)`);
                        updateStatus(`Checked ${data.expired_bets_found} pending bets`, 'info');
                    }
                } else {
                    log(`❌ Update failed: ${data.message}`);
                    updateStatus(`Update failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error running update: ${error.message}`);
                updateStatus(`Error: ${error.message}`, 'error');
            }
            
            updateStats();
        }
        
        async function testUpdate() {
            log('🧪 Testing auto-update...');
            updateStatus('Testing...', 'info');
            
            try {
                const response = await fetch('auto_update_pending_bets.php');
                const data = await response.json();
                
                if (data.success) {
                    log(`✅ Test successful: ${data.updated_count} bets updated`);
                    updateStatus(`Test successful: ${data.updated_count} bets updated`, 'success');
                } else {
                    log(`❌ Test failed: ${data.message}`);
                    updateStatus(`Test failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Test error: ${error.message}`);
                updateStatus(`Test error: ${error.message}`, 'error');
            }
        }
        
        function clearLog() {
            document.getElementById('log').textContent = 'Log cleared...\n';
        }
        
        // เริ่มต้น
        log('🚀 Auto Update Service loaded');
        log('💡 This service will automatically update pending bets every 30 seconds');
        log('💡 Perfect for running on domain without batch files');
        
        // เริ่มต้นอัตโนมัติ
        setTimeout(() => {
            log('🔄 Auto-starting service in 3 seconds...');
            setTimeout(startService, 3000);
        }, 2000);
    </script>
</body>
</html>
